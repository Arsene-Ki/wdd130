<!DOCTYPE html>
<html lang="en-US">
    <head>
        
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <meta name="description" content="Arsene Kitemba's WDD 130 homepage.">
      <meta name="author" content="Arsene Kitemba">
      <link rel="stylesheet" href="styles/overlay.css">
      <title>OVERLAY</title>
    </head>
    <body>
        <header>
            <nav>
                <a href="#">Home</a>
                <a href="rafting.html">rafting site</a>
            </nav>
        </header>
        <main>
            <h1>CSS Layout: Position Absolute</h1>
        
            <img src="https://churchofjesuschristtemples.org/assets/img/temples/salvador-brazil-temple/salvador-brazil-temple-51668-main.jpg" alt="Placeholder image" width="700" height="300">

          <section>
             <div class="overlay">
			<h2>Brazil</h2>
			<p>Language: <span id="lan">Portuguese</span></p>
			<p>Size: <span id="size">8.5m km<sup>2</up></span></p>
			<p>Visted?: <span id="visit">No</span></p>
            </div>
		</section>
        </main>
        <footer>
           <p> Content in Fixed Position with bottom set at 2 pixels.</p>
           <p>Last Updated: May 22, 2025</p>
           <p>&copy; 2025 🌳🌳KITEMBA NGOY🌳🌳, Lubumbashi, DR Congo</p>
        </footer>
        <script>
        // Set footer to fixed position with 2px from the bottom
        document.addEventListener("DOMContentLoaded", function() {
            const footer = document.querySelector('footer');
            footer.style.position = "fixed";
            footer.style.left = "0";
            footer.style.right = "0";
            footer.style.bottom = "2px";
            footer.style.background = "#fff";
            footer.style.textAlign = "center";
            footer.style.zIndex = "100";
        });
        </script>
    </body>
</html>
